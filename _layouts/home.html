---
layout: page
---

<img src="{{ 'assets/images/profile.png' | relative_url }}" class="mx-auto my-5 rounded-circle w-50" alt="{{ site.author }}" loading="lazy" />
<h1 class="display-5 fw-bold mb-3">{{ site.data.home.copy.heading }}</h1>
<div class="fs-5 mb-4">
  {% for paragraph in site.data.home.copy.bio %}
  <p>{{ paragraph }}</p>
  {% endfor %}
  <p>{{ site.data.home.copy.contact.first }} <a href="mailto:{{ site.data.home.copy.contact.last }}">{{ site.data.home.copy.contact.last }}</a>.</p>
</div>
<ul class="nav mb-5 justify-content-center list-unstyled">
  {% for icon in site.data.home.icons %}
  <li class="mx-2">
    <a class="icon-link" href="{{ icon.url }}">
      <svg width="36" height="36" fill="currentColor">
        <title>{{ icon.title }}</title>
        <use xlink:href="#{{ icon.id }}" />
      </svg>
    </a>
  </li>
  {% endfor %}
</ul>
